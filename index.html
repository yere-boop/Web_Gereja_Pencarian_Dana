<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sistem Kasir Pencarian Dana GPdI Galilea Tondano - Kelola transaksi dan laporan keuangan gereja dengan mudah.">
    <title>Kasir GPdI Galilea Tondano</title>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="auth-container">
            <div class="auth-card">
                <div style="margin-bottom: 8px;">
                    <div style="width: 56px; height: 56px; background: linear-gradient(135deg, #10b981, #064e3b); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; box-shadow: 0 4px 12px rgba(6,78,59,0.3);">
                        <i data-lucide="church" style="color: white; width: 28px; height: 28px;"></i>
                    </div>
                </div>
                <h1>GPdI Galilea</h1>
                <p>Sistem Kasir Pencarian Dana</p>
                <form id="login-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" class="form-input" placeholder="Masukkan username" required>
                    </div>
                    <div class="form-group" style="position: relative;">
                        <label>Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Masukkan password" required>
                        <button type="button" id="toggle-password" style="position: absolute; right: 12px; top: 38px; background: none; color: var(--text-muted);">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <button type="submit" class="btn-primary" style="margin-top: 12px;">
                        Masuk ke Sistem
                    </button>
                </form>
                <div style="margin-top: 24px; font-size: 0.75rem; color: var(--text-muted);">
                    &copy; 2025 GPdI Galilea Tondano
                </div>
            </div>
        </div>

        <!-- Main App View (Hidden by default) -->
        <div id="app-view" class="app-shell hidden">
            <!-- Sidebar -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <div>
                        <div class="church-name">GPdI Galilea</div>
                        <div style="font-size: 0.7rem; opacity: 0.4; letter-spacing: 1.5px; text-transform: uppercase; margin-top: 4px; font-weight: 500;">Pencarian Dana</div>
                    </div>
                </div>
                <nav class="nav-menu">
                    <li class="nav-item">
                        <a href="#" class="nav-link active" data-page="pos">
                            <i data-lucide="shopping-cart"></i> Transaksi
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-page="products">
                            <i data-lucide="package"></i> Produk
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-page="history">
                            <i data-lucide="history"></i> Riwayat
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-page="reports">
                            <i data-lucide="bar-chart-2"></i> Laporan
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-page="settings">
                            <i data-lucide="settings"></i> Pengaturan
                        </a>
                    </li>
                </nav>
                <div class="sidebar-footer">
                    <button id="btn-logout" class="nav-link" style="width: 100%; border: none; background: none; text-align: left; cursor: pointer; color: rgba(255,255,255,0.4); gap: 12px;">
                        <i data-lucide="log-out"></i> Keluar
                    </button>
                </div>
            </aside>

            <!-- Main Content Area -->
            <main class="main-content">
                <header class="top-bar">
                    <div id="page-title">
                        <h2 id="current-view-title">Transaksi Baru</h2>
                    </div>
                    <div class="user-profile">
                        <div class="avatar">A</div>
                        <div>
                            <div style="font-weight: 700; font-size: 0.85rem; color: var(--text);" id="admin-display-name">Admin</div>
                            <div style="font-size: 0.7rem; color: var(--text-muted); font-weight: 500;" id="header-church-name">GPdI Galilea Tondano</div>
                        </div>
                    </div>
                </header>

                <div id="content-area">
                    <!-- Dynamic content will be injected here -->
                </div>
            </main>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay">
        <div class="modal-content" id="modal-body">
            <!-- Modal content injected here -->
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
